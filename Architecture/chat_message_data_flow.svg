  <text x="148" y="340" text-anchor="end" style="opacity:0.5;fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:0.869565px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:10.434783px;font-weight:400;text-anchor:end;dominant-baseline:auto">AI provider</text>
